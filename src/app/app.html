<h1>Risk Compliance Sandbox</h1>
<app-threat-form (onThreatCreated)="createNewThreat($event.title,$event.severity)"></app-threat-form>
<hr>


<p><strong>Current User Role:</strong> {{ userRole }}</p>
<p><strong>Security Status:</strong> {{ appStatus }}</p>

<hr>


<h3>System Controls</h3>
<button [disabled]="isSystemLocked">Initiate Global Audit</button>


<button (click)="togglelock()">
  {{ isSystemLocked ? 'Unlock System' : 'Lock System' }}
</button>

<hr>


<h3>Active Threat Log</h3>


<app-threat-table></app-threat-table>
